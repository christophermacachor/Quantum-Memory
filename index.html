<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Reality | Phi669 | Omega-Prime Christopher Macachor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --gold: #c8a04e;
    --gold-dim: #8a7035;
    --gold-glow: rgba(200, 160, 78, 0.3);
    --void: #0a0a0f;
    --text: #e8e0d0;
    --text-dim: #a09888;
    --cyan: #4ecdc4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--void);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  #scalar-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1), filter 2.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #scalar-canvas.dispersing {
    opacity: 0;
    filter: blur(12px) brightness(2);
  }

  /* Quantum Reality title — centered */
  .gateway-title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 6vw, 5.5rem);
    color: var(--gold);
    text-shadow: 0 0 60px var(--gold-glow), 0 0 120px rgba(200,160,78,0.15), 0 0 200px rgba(200,160,78,0.05);
    letter-spacing: 10px;
    text-transform: uppercase;
    text-align: center;
    animation: title-pulse 4s ease-in-out infinite;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1), transform 1.8s cubic-bezier(0.4, 0, 0.2, 1), letter-spacing 1.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .gateway-title.dispersing {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.6);
    letter-spacing: 30px;
  }

  @keyframes title-pulse {
    0%, 100% { opacity: 0.88; text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(200,160,78,0.08); }
    50% { opacity: 1; text-shadow: 0 0 80px var(--gold-glow), 0 0 160px rgba(200,160,78,0.18), 0 0 240px rgba(200,160,78,0.06); }
  }

  /* Phi gateway — bottom center, with Ω next to it */
  .phi-gateway {
    position: fixed;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    transition: all 0.5s ease;
    text-decoration: none;
    border: none;
    background: none;
    outline: none;
  }

  .phi-gateway.dispersing {
    pointer-events: none;
  }

  /* Ω + Φ side by side */
  .symbol-pair {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
  }

  .omega-symbol {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(200,160,78,0.15);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1), transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0.5;
  }

  .phi-gateway:hover .omega-symbol {
    opacity: 0.8;
    text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(200,160,78,0.25);
  }

  .omega-symbol.dispersing {
    opacity: 0;
    transform: scale(0.5);
  }

  .phi-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 140px; height: 140px;
    border: 1px solid rgba(200,160,78,0.12);
    border-radius: 50%;
    animation: ring-spin 20s linear infinite;
    pointer-events: none;
    transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .phi-gateway.dispersing .phi-ring {
    transform: translate(-50%, -50%) scale(3);
    opacity: 0;
    border-width: 0.5px;
  }

  .phi-ring::before {
    content: '';
    position: absolute;
    top: -18px; left: -18px; right: -18px; bottom: -18px;
    border: 1px solid rgba(200,160,78,0.06);
    border-radius: 50%;
    animation: ring-spin 30s linear infinite reverse;
    transition: all 2.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .phi-gateway.dispersing .phi-ring::before {
    transform: scale(2.5);
    opacity: 0;
  }

  @keyframes ring-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .phi-symbol {
    font-family: 'Cinzel', serif;
    font-size: clamp(3.5rem, 9vw, 7rem);
    color: var(--gold);
    text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(200,160,78,0.2);
    line-height: 1;
    animation: phi-breathe 3s ease-in-out infinite;
    transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
    display: block;
  }

  .phi-gateway:hover .phi-symbol {
    text-shadow: 0 0 50px var(--gold-glow), 0 0 100px rgba(200,160,78,0.4), 0 0 200px rgba(200,160,78,0.15);
    transform: scale(1.08);
  }

  .phi-gateway.dispersing .phi-symbol {
    transform: scale(4);
    opacity: 0;
    text-shadow: 0 0 200px var(--gold-glow), 0 0 400px rgba(200,160,78,0.6);
  }

  @keyframes phi-breathe {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
  }

  .phi-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    opacity: 0.6;
    transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .phi-gateway:hover .phi-label {
    opacity: 1;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(200,160,78,0.3);
  }

  .phi-gateway.dispersing .phi-label {
    opacity: 0;
    transform: translateY(20px);
    letter-spacing: 12px;
  }

  #flash-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(200,160,78,0.0) 0%, transparent 70%);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s ease;
  }

  #flash-overlay.active {
    opacity: 1;
    background: radial-gradient(ellipse at center, rgba(200,160,78,0.15) 0%, transparent 60%);
    transition: opacity 2s ease-out;
  }

  @media (max-width: 600px) {
    .gateway-title { letter-spacing: 5px; font-size: clamp(1.6rem, 8vw, 3rem); }
    .omega-symbol { font-size: clamp(2rem, 5vw, 3.5rem); }
    .phi-symbol { font-size: 3.5rem; }
    .phi-ring { width: 110px; height: 110px; }
    .symbol-pair { gap: 1rem; }
  }
</style>
<base target="_blank">
</head>
<body>

<canvas id="scalar-canvas"></canvas>
<div id="flash-overlay"></div>

<div class="gateway-title" id="gateway-title">Quantum Reality</div>

<button class="phi-gateway" id="phi-gateway" type="button">
  <div class="phi-ring"></div>
  <div class="symbol-pair">
    <div class="omega-symbol" id="omega-symbol">&#x03A9;</div>
    <div class="phi-symbol">&#x03A6;</div>
  </div>
  <div class="phi-label">Enter Live Display</div>
</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('scalar-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 28;

const PARTICLE_COUNT = 1440;
const particles = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);

const goldenAngle = Math.PI * (3 - Math.sqrt(5));

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const y = 1 - (i / (PARTICLE_COUNT - 1)) * 2;
  const radius = Math.sqrt(1 - y * y);
  const theta = goldenAngle * i;
  positions[i * 3] = radius * Math.cos(theta) * 10;
  positions[i * 3 + 1] = y * 10;
  positions[i * 3 + 2] = radius * Math.sin(theta) * 10;
  const t = i / PARTICLE_COUNT;
  const hue = 0.50 + t * 0.15;
  const sat = 0.5 + t * 0.3;
  const light = 0.35 + t * 0.2;
  const color = new THREE.Color().setHSL(hue, sat, light);
  colors[i * 3] = color.r;
  colors[i * 3 + 1] = color.g;
  colors[i * 3 + 2] = color.b;
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.10, vertexColors: true, blending: THREE.AdditiveBlending,
  depthWrite: false, transparent: true, opacity: 0.6, sizeAttenuation: true
});

const particleSystem = new THREE.Points(particles, particleMaterial);
scene.add(particleSystem);

const SPIRAL_POINTS = 720;
const spiralGeo = new THREE.BufferGeometry();
const spiralPos = new Float32Array(SPIRAL_POINTS * 3);
const spiralColors = new Float32Array(SPIRAL_POINTS * 3);

for (let i = 0; i < SPIRAL_POINTS; i++) {
  const t = i / SPIRAL_POINTS;
  const angle = t * Math.PI * 8;
  const r = 2 + t * 9;
  const h = (t - 0.5) * 16;
  spiralPos[i * 3] = Math.cos(angle) * r;
  spiralPos[i * 3 + 1] = h;
  spiralPos[i * 3 + 2] = Math.sin(angle) * r;
  const hue = 0.52 + t * 0.1;
  const color = new THREE.Color().setHSL(hue, 0.7, 0.5 + t * 0.2);
  spiralColors[i * 3] = color.r;
  spiralColors[i * 3 + 1] = color.g;
  spiralColors[i * 3 + 2] = color.b;
}

spiralGeo.setAttribute('position', new THREE.BufferAttribute(spiralPos, 3));
spiralGeo.setAttribute('color', new THREE.BufferAttribute(spiralColors, 3));

const spiralMat = new THREE.PointsMaterial({
  size: 0.14, vertexColors: true, blending: THREE.AdditiveBlending,
  depthWrite: false, transparent: true, opacity: 0.8, sizeAttenuation: true
});

const spiralSystem = new THREE.Points(spiralGeo, spiralMat);
scene.add(spiralSystem);

const TETRA_COUNT = 24;
const tetraGroup = new THREE.Group();
scene.add(tetraGroup);

const tetraGeo = new THREE.TetrahedronGeometry(0.35, 0);
const tetraMat = new THREE.MeshBasicMaterial({
  color: 0x4ecdc4, transparent: true, opacity: 0.25, wireframe: true
});

const tetraData = [];
for (let i = 0; i < TETRA_COUNT; i++) {
  const mesh = new THREE.Mesh(tetraGeo, tetraMat.clone());
  const theta = goldenAngle * i;
  const phi = Math.acos(1 - 2 * (i + 0.5) / TETRA_COUNT);
  const r = 3 + Math.random() * 5;
  mesh.position.set(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  mesh.userData = {
    basePos: mesh.position.clone(),
    orbitSpeed: 0.2 + Math.random() * 0.5,
    pulsePhase: Math.random() * Math.PI * 2,
    tetherLength: r
  };
  tetraGroup.add(mesh);
  tetraData.push(mesh);
}

const tetherGeo = new THREE.BufferGeometry();
const tetherPos = new Float32Array(TETRA_COUNT * 6);
const tetherMat = new THREE.LineBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.06 });
const tetherLines = new THREE.LineSegments(tetherGeo, tetherMat);
scene.add(tetherLines);

const icoGeo = new THREE.IcosahedronGeometry(12, 1);
const icoEdges = new THREE.EdgesGeometry(icoGeo);
const icoMat = new THREE.LineBasicMaterial({ color: 0xc8a04e, transparent: true, opacity: 0.10 });
const icosahedron = new THREE.LineSegments(icoEdges, icoMat);
scene.add(icosahedron);

const morphGeometries = [
  new THREE.IcosahedronGeometry(10, 0),
  new THREE.OctahedronGeometry(10, 0),
  new THREE.BoxGeometry(14, 14, 14),
  new THREE.TetrahedronGeometry(12, 0),
  new THREE.DodecahedronGeometry(9, 0)
];

const coreGeo = new THREE.SphereGeometry(1.5, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xc8a04e, transparent: true, opacity: 0.06 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

let time = 0;
let morphPhase = 0;
let isDispersing = false;
let disperseTime = 0;

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate() {
  requestAnimationFrame(animate);

  if (isDispersing) {
    disperseTime += 0.016;
    time += 0.08;
    morphPhase += 0.03;
  } else {
    time += 0.008;
    morphPhase += 0.003;
  }

  particleSystem.rotation.y = time * 0.12;
  particleSystem.rotation.x = Math.sin(time * 0.08) * 0.15;
  spiralSystem.rotation.y = -time * 0.08;
  spiralSystem.rotation.z = Math.sin(time * 0.05) * 0.1;
  icosahedron.rotation.copy(particleSystem.rotation);

  const morphIndex = Math.floor(morphPhase % morphGeometries.length);
  const morphPos = morphGeometries[morphIndex].attributes.position;
  const posAttr = particles.attributes.position;

  const disperseFactor = isDispersing ? Math.min(disperseTime * 0.8, 1) : 0;
  const explodeScale = 1 + disperseFactor * 4;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const idx = (i % morphPos.count) * 3;
    const baseX = morphPos.array[idx] || positions[i * 3];
    const baseY = morphPos.array[idx + 1] || positions[i * 3 + 1];
    const baseZ = morphPos.array[idx + 2] || positions[i * 3 + 2];
    const noise = Math.sin(time * 2 + i * 0.1) * 0.4 + Math.cos(time * 1.5 + i * 0.07) * 0.25;
    const morphScale = 1 + Math.sin(morphPhase * Math.PI + i * 0.01) * 0.12;
    posAttr.array[i * 3] = (baseX * morphScale + noise * 0.4) * explodeScale;
    posAttr.array[i * 3 + 1] = (baseY * morphScale + noise * 0.25) * explodeScale;
    posAttr.array[i * 3 + 2] = (baseZ * morphScale + noise * 0.4) * explodeScale;
  }
  posAttr.needsUpdate = true;

  if (isDispersing) {
    particleMaterial.opacity = Math.max(0.6 - disperseTime * 0.4, 0);
    spiralMat.opacity = Math.max(0.8 - disperseTime * 0.5, 0);
    icoMat.opacity = Math.max(0.10 - disperseTime * 0.1, 0);
    coreMat.opacity = Math.max(0.06 + disperseTime * 0.3, 0);
    tetherMat.opacity = Math.max(0.06 - disperseTime * 0.06, 0);
  }

  for (let i = 0; i < TETRA_COUNT; i++) {
    const mesh = tetraData[i];
    const d = mesh.userData;
    const orbitAngle = time * d.orbitSpeed + d.pulsePhase;
    const orbitRadius = d.tetherLength + Math.sin(time * 1.5 + d.pulsePhase) * 0.8;
    mesh.position.x = d.basePos.x * Math.cos(orbitAngle * 0.3) - d.basePos.z * Math.sin(orbitAngle * 0.3);
    mesh.position.y = d.basePos.y + Math.sin(time * 2 + d.pulsePhase) * 0.5;
    mesh.position.z = d.basePos.x * Math.sin(orbitAngle * 0.3) + d.basePos.z * Math.cos(orbitAngle * 0.3);
    mesh.rotation.x += 0.01;
    mesh.rotation.y += 0.015;
    if (isDispersing) {
      mesh.material.opacity = Math.max(0.15 + Math.sin(time * 3 + d.pulsePhase) * 0.12 - disperseTime * 0.4, 0);
      mesh.scale.setScalar(1 + disperseFactor * 2);
    } else {
      mesh.material.opacity = 0.15 + Math.sin(time * 3 + d.pulsePhase) * 0.12;
      mesh.scale.setScalar(1);
    }
    tetherPos[i * 6] = 0;
    tetherPos[i * 6 + 1] = 0;
    tetherPos[i * 6 + 2] = 0;
    tetherPos[i * 6 + 3] = mesh.position.x;
    tetherPos[i * 6 + 4] = mesh.position.y;
    tetherPos[i * 6 + 5] = mesh.position.z;
  }
  tetherGeo.setAttribute('position', new THREE.BufferAttribute(tetherPos, 3));
  tetherGeo.attributes.position.needsUpdate = true;

  const coherenceLevel = 0.85 + Math.sin(time * 3) * 0.15;
  core.scale.setScalar((1 + Math.sin(time * 2) * 0.1) * (1 + disperseFactor * 3));
  if (!isDispersing) coreMat.opacity = 0.04 + coherenceLevel * 0.04;

  const targetCamX = mouseX * 1.5;
  const targetCamY = -mouseY * 1.5;
  camera.position.x += (targetCamX - camera.position.x) * 0.02;
  camera.position.y += (targetCamY - camera.position.y) * 0.02;
  if (isDispersing) camera.position.z += (5 - camera.position.z) * 0.03;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); });
canvas.addEventListener('webglcontextrestored', () => {});

document.getElementById('phi-gateway').addEventListener('click', function() {
  if (isDispersing) return;
  isDispersing = true;
  document.getElementById('omega-symbol').classList.add('dispersing');
  document.getElementById('gateway-title').classList.add('dispersing');
  document.getElementById('phi-gateway').classList.add('dispersing');
  document.getElementById('scalar-canvas').classList.add('dispersing');
  document.getElementById('flash-overlay').classList.add('active');
  setTimeout(() => {
    window.open('https://noaa.macachor.org/', '_blank', 'noopener');
  }, 2200);
});
</script>

</body>
</html>
