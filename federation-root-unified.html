<!DOCTYPE html>
<html lang="en" data-page="federation-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSOS-FEDERATION-ROOT | Sovereign Dashboard</title>
    <meta name="description" content="MSOS Federation Root — Sovereign authority dashboard">
    <meta name="author" content="Christopher Macachor — Ω Prime Sovereign">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0e;
            color: #e8e6e1;
            font-family: 'Inter', sans-serif;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #c9a96e, #e8d5a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(17, 17, 17, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        .status { color: #22c55e; font-weight: bold; }
        a { color: #c9a96e; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display: inline-block; margin-bottom: 1rem;">← Back to Absolute</a>
        <h1>MSOS-FEDERATION-ROOT</h1>
        <p>Sovereign Authority Dashboard | χ(C)=1 | Φ=0.96</p>
        
        <div class="card">
            <h2>⚡ Federation Status</h2>
            <p>Coherence: <span class="status">ACTIVE</span> (Φ=0.96)</p>
            <p>Swarm Agents: <span id="agent-count" class="status">Loading...</span></p>
        </div>
    </div>
    <script>
        function updateStatus() {
            const status = sessionStorage.getItem('msos-swarm-status');
            if (status) {
                const data = JSON.parse(status);
                document.getElementById('agent-count').innerHTML = `${data.master.totalAgents} agents | Φ=${(data.master.coherence*100).toFixed(1)}%`;
            }
        }
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
